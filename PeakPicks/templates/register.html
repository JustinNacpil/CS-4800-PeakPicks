{% extends "base.html" %}
{% block title %}Register - PeakPicks{% endblock %}

{% block content %}
  <div class="auth-form">
    <h2>Create Account</h2>

    <div id="formError" class="message error" style="display:none;"></div>

    <form id="registerForm" action="/register" method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
      </div>
      <div class="form-group">
        <label for="passwordConfirm">Confirm Password</label>
        <input type="password" id="passwordConfirm" name="password_confirm" placeholder="Confirm your password" required>
      </div>
      <button type="submit" class="btn" style="width:100%; justify-content:center; margin-top:1rem;">
        Create Account
      </button>
    </form>

    <div class="divider">Already have an account?</div>
    <a href="/login" class="btn btn-secondary" style="width:100%; justify-content:center;">Login Instead</a>
  </div>
{% endblock %}
