{% extends "base.html" %}

{% block title %}{{ category }} Tier List - PeakPicks{% endblock %}

{% block content %}
  <div class="tierlist-header">
    <h1>{{ category }} Tier List</h1>
    <p class="tagline">Interactive tier list visualization</p>
    <div class="tierlist-controls">
      <div class="control-group">
        <label>Theme:</label>
        <select id="themeSelect" onchange="applyTheme(this.value)">
          <option value="classic">Classic</option>
          <option value="neon">Neon</option>
          <option value="pastel">Pastel</option>
          <option value="ocean">Ocean</option>
          <option value="fire">Fire</option>
          <option value="monochrome">Monochrome</option>
        </select>
      </div>
      <div class="control-group">
        <label>Layout:</label>
        <select id="layoutSelect" onchange="applyLayout(this.value)">
          <option value="rows">Classic Rows</option>
          <option value="grid">Card Grid</option>
          <option value="compact">Compact List</option>
          <option value="detailed">Detailed Cards</option>
        </select>
      </div>
      <a href="/create" class="btn btn-small">➕ Add Items</a>
    </div>
  </div>

  <div class="tierlist-view" id="tierlistContainer" data-theme="classic" data-layout="rows"></div>

  <div style="margin-top: 2rem; text-align: center;">
    <a href="/picks?category={{ category|urlencode }}" class="btn btn-secondary">← Back to Picks</a>
  </div>
{% endblock %}

{% block scripts %}
  <script>
    const initialCategory = "{{ category }}";
  </script>
{% endblock %}
