{% extends "base.html" %}

{% block title %}Browse Picks - PeakPicks{% endblock %}

{% block content %}
  <h1>Browse Picks</h1>
  <p class="tagline">Explore picks from the community</p>

  <div class="search-container">
    <form class="row" style="gap: 0.75rem;">
      <input
        type="text"
        id="filterCategory"
        placeholder="Filter by category... (e.g., Movies, Games)"
        value="{{ category }}"
      >
      <button type="button" id="searchBtn" class="btn btn-small">Search</button>
    </form>
  </div>

  <div class="grid" id="picksList"></div>
{% endblock %}

{% block scripts %}
  <script>
    const initialCategory = "{{ category }}";
  </script>
{% endblock %}
